name: Daily LSTM Forecast

on:
  # Run daily at 9:30 AM EST (after market open)
  schedule:
    - cron: '30 14 * * 1-5'  # 9:30 AM EST on weekdays (UTC-5/UTC-4)
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if market is closed'
        required: false
        default: false
        type: boolean

# Set timezone for the workflow
env:
  TZ: America/New_York

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    # UPDATED: Use Node.js 20 (required for M365 CLI)
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # Install Microsoft 365 CLI (now compatible with Node.js 20)
    - name: Install Microsoft 365 CLI
      run: |
        npm install -g @pnp/cli-microsoft365
        echo "M365 CLI version:"
        m365 --version
        echo "Node.js version:"
        node --version
        
    - name: Verify project structure
      run: |
        echo "Project structure:"
        ls -la
        echo "Source directory:"
        ls -la src/
        echo "Models directory:"
        ls -la models/
        echo "Data directories:"
        ls -la data/
        
    - name: Set up environment variables
      run: |
        echo "Setting up environment variables for forecasting..."
        # Environment variables are set via GitHub secrets
        # FRED_API_KEY, EMAIL_*, NOTIFICATION_EMAIL are available as secrets
        
    - name: Run daily forecast
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        PROJECT_ROOT: ${{ github.workspace }}
        PYTHONPATH: ${{ github.workspace }}/src
        FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      run: |
        cd src
        python daily_forecast.py
        
    - name: Upload forecast results
      if: always()  # Upload even if forecast fails for debugging
      uses: actions/upload-artifact@v4
      with:
        name: forecast-results-${{ github.run_number }}
        path: |
          data/upload/*.csv
          logs/*.log
        retention-days: 30
        
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: forecast-failure-logs-${{ github.run_number }}
        path: logs/
        retention-days: 90
        
    - name: Check forecast outputs
      if: success()
      run: |
        echo "Checking forecast outputs..."
        if [ -f data/upload/actuals.csv ]; then
          echo "✓ Actuals data saved"
          echo "Rows in actuals.csv: $(wc -l < data/upload/actuals.csv)"
        else
          echo "✗ Actuals data missing"
        fi
        
        if [ -f data/upload/predicted.csv ]; then
          echo "✓ Predictions data saved"
          echo "Rows in predicted.csv: $(wc -l < data/upload/predicted.csv)"
        else
          echo "✗ Predictions data missing"
        fi
        
        if [ -f data/upload/forecasted_data.csv ]; then
          echo "✓ Forecast data saved"
          echo "Rows in forecasted_data.csv: $(wc -l < data/upload/forecasted_data.csv)"
        else
          echo "✗ Forecast data missing"
        fi
        
        if [ -f data/upload/model_metrics.csv ]; then
          echo "✓ Model metrics saved"
          echo "Metrics content:"
          head -n 5 data/upload/model_metrics.csv
        else
          echo "✗ Model metrics missing"
        fi
    
    # Authenticate with Microsoft 365 CLI
    - name: Authenticate with Microsoft 365
      if: success()
      env:
        M365_USERNAME: ${{ secrets.M365_USERNAME }}
        M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
      run: |
        echo "Authenticating with Microsoft 365..."
        
        # Method 1: Try username/password authentication
        if [ -n "$M365_USERNAME" ] && [ -n "$M365_PASSWORD" ]; then
          echo "Attempting username/password authentication..."
          echo "Username: $M365_USERNAME"
          
          # Use password authentication with proper input handling
          echo "$M365_PASSWORD" | m365 login --authType password --userName "$M365_USERNAME"
          
          if [ $? -eq 0 ]; then
            echo "✓ Password authentication successful"
          else
            echo "✗ Password authentication failed"
            exit 1
          fi
        else
          echo "✗ M365 credentials not found in secrets"
          exit 1
        fi
        
        # Verify authentication status
        echo "Verifying authentication status..."
        m365 status
        
    # Upload CSV files using Microsoft 365 CLI
    - name: Upload CSV files to SharePoint
      if: success()
      env:
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
      run: |
        echo "Uploading CSV files to SharePoint using M365 CLI..."
        echo "Site URL: $SHAREPOINT_SITE_URL"
        
        # Set default library if folder path not specified
        LIBRARY_NAME="${SHAREPOINT_FOLDER_PATH:-Shared Documents}"
        echo "Target library/folder: $LIBRARY_NAME"
        
        # Check if data/upload directory exists and has CSV files
        if [ ! -d "data/upload" ]; then
          echo "✗ data/upload directory not found"
          exit 1
        fi
        
        cd data/upload
        csv_count=$(ls -1 *.csv 2>/dev/null | wc -l)
        
        if [ $csv_count -eq 0 ]; then
          echo "✗ No CSV files found in data/upload/"
          ls -la
          exit 1
        fi
        
        echo "Found $csv_count CSV files to upload"
        
        # Upload each CSV file
        upload_success=0
        upload_total=0
        
        for csv_file in *.csv; do
          if [ -f "$csv_file" ]; then
            echo "----------------------------------------"
            echo "Uploading: $csv_file"
            
            # Generate timestamped filename
            timestamp=$(date +"%Y%m%d_%H%M%S")
            base_name="${csv_file%.*}"
            filename="${base_name}_${timestamp}.csv"
            
            upload_total=$((upload_total + 1))
            
            # Upload file with error handling
            if m365 spo file add \
              --webUrl "$SHAREPOINT_SITE_URL" \
              --folder "$LIBRARY_NAME" \
              --path "$csv_file" \
              --name "$filename" \
              --output json > "upload_result_${upload_total}.json"; then
              
              echo "✓ Successfully uploaded: $filename"
              
              # Show upload details
              if [ -f "upload_result_${upload_total}.json" ]; then
                echo "Upload details:"
                cat "upload_result_${upload_total}.json" | jq -r '.Name // "Unknown name"' | xargs -I {} echo "  File: {}"
                cat "upload_result_${upload_total}.json" | jq -r '.ServerRelativeUrl // "Unknown URL"' | xargs -I {} echo "  URL: {}"
                cat "upload_result_${upload_total}.json" | jq -r '.Length // "Unknown size"' | xargs -I {} echo "  Size: {} bytes"
              fi
              
              upload_success=$((upload_success + 1))
            else
              echo "✗ Failed to upload: $csv_file"
              if [ -f "upload_result_${upload_total}.json" ]; then
                echo "Error details:"
                cat "upload_result_${upload_total}.json"
              fi
            fi
            
            # Clean up result file
            rm -f "upload_result_${upload_total}.json"
          fi
        done
        
        echo "----------------------------------------"
        echo "Upload Summary:"
        echo "Total files: $upload_total"
        echo "Successful uploads: $upload_success"
        echo "Failed uploads: $((upload_total - upload_success))"
        
        if [ $upload_success -eq 0 ]; then
          echo "✗ No files were uploaded successfully"
          exit 1
        elif [ $upload_success -lt $upload_total ]; then
          echo "⚠ Some files failed to upload"
          exit 0  # Don't fail the workflow for partial success
        else
          echo "✓ All files uploaded successfully"
        fi
        
    # Cleanup M365 authentication
    - name: Logout from Microsoft 365
      if: always()
      run: |
        echo "Cleaning up M365 session..."
        m365 logout || echo "Logout failed or already logged out"
        
    - name: SharePoint upload summary
      if: success()
      run: |
        echo "==============================================="
        echo "✓ CSV UPLOAD SUCCESSFUL"
        echo "Site: ${{ secrets.SHAREPOINT_SITE_URL }}"
        echo "Library: ${{ secrets.SHAREPOINT_FOLDER_PATH }}"
        echo "Upload method: Microsoft 365 CLI"
        echo "Upload timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "==============================================="
        
    - name: Summary
      if: always()
      run: |
        echo "===== DAILY FORECAST WORKFLOW SUMMARY ====="
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Triggered by: ${{ github.event_name }}"
        echo "Status: ${{ job.status }}"
        echo "Timestamp: $(date -u)"
        echo "=============================================="
