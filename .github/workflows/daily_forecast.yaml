name: Daily LSTM Forecast

on:
  schedule:
    - cron: '30 14 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if market is closed'
        required: false
        default: false
        type: boolean

env:
  TZ: America/New_York

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install requests-ntlm
        
    - name: Verify project structure
      run: |
        echo "Project structure:"
        ls -la
        echo "Source directory:"
        ls -la src/
        echo "Models directory:"
        ls -la models/
        echo "Data directories:"
        ls -la data/
        
    - name: Run daily forecast
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        PROJECT_ROOT: ${{ github.workspace }}
        PYTHONPATH: ${{ github.workspace }}/src
        FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      run: |
        cd src
        python daily_forecast.py
        
    - name: Upload forecast results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: forecast-results-${{ github.run_number }}
        path: |
          data/upload/*.csv
          logs/*.log
        retention-days: 30
        
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: forecast-failure-logs-${{ github.run_number }}
        path: logs/
        retention-days: 90
        
    - name: Check forecast outputs
      if: success()
      run: |
        echo "Checking forecast outputs..."
        echo "Files in data/upload:"
        ls -la data/upload/ || echo "No data/upload directory"
        
        echo "Checking for actual output files:"
        for file in data/upload/*.csv; do
          if [ -f "$file" ]; then
            basename_file=$(basename "$file")
            echo "Found: $basename_file ($(wc -l < "$file") lines)"
          fi
        done
    
    - name: Upload CSV files to SharePoint
      if: success()
      env:
        M365_USERNAME: ${{ secrets.M365_USERNAME }}
        M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
      run: |
        echo "Starting daily SharePoint upload..."
        python daily_sharepoint_uploader.py
        
    - name: SharePoint upload summary
      if: success()
      run: |
        echo "==========================================="
        echo "DAILY WORKFLOW COMPLETED SUCCESSFULLY"
        echo "Forecast: Generated fresh daily data"
        echo "Artifacts: Saved to GitHub Actions"
        echo "SharePoint: CSV files uploaded"
        echo "Next run: Tomorrow at 9:30 AM EST"
        echo "Completed: $(date -u)"
        echo "==========================================="
        
    - name: Summary
      if: always()
      run: |
        echo "===== DAILY FORECAST WORKFLOW SUMMARY ====="
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Triggered by: ${{ github.event_name }}"
        echo "Status: ${{ job.status }}"
        echo "Timestamp: $(date -u)"
        echo "=============================================="
