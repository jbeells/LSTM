name: Daily LSTM Forecast

on:
  # Run daily at 9:30 AM EST (after market open)
  schedule:
    - cron: '30 14 * * 1-5'  # 9:30 AM EST on weekdays (UTC-5/UTC-4)
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if market is closed'
        required: false
        default: false
        type: boolean

# Set timezone for the workflow
env:
  TZ: America/New_York

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Microsoft 365 CLI
      run: |
        npm install -g @pnp/cli-microsoft365
        echo "M365 CLI version:"
        m365 --version
        echo "Node.js version:"
        node --version
        
    - name: Verify project structure
      run: |
        echo "Project structure:"
        ls -la
        echo "Source directory:"
        ls -la src/
        echo "Models directory:"
        ls -la models/
        echo "Data directories:"
        ls -la data/
        
    - name: Set up environment variables
      run: |
        echo "Setting up environment variables for forecasting..."
        # Environment variables are set via GitHub secrets
        # FRED_API_KEY, EMAIL_*, NOTIFICATION_EMAIL are available as secrets
        
    - name: Run daily forecast
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        PROJECT_ROOT: ${{ github.workspace }}
        PYTHONPATH: ${{ github.workspace }}/src
        FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      run: |
        cd src
        python daily_forecast.py
        
    - name: Upload forecast results
      if: always()  # Upload even if forecast fails for debugging
      uses: actions/upload-artifact@v4
      with:
        name: forecast-results-${{ github.run_number }}
        path: |
          data/upload/*.csv
          logs/*.log
        retention-days: 30
        
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: forecast-failure-logs-${{ github.run_number }}
        path: logs/
        retention-days: 90
        
    - name: Check forecast outputs
      if: success()
      run: |
        echo "Checking forecast outputs..."
        if [ -f data/upload/actuals.csv ]; then
          echo "✓ Actuals data saved"
          echo "Rows in actuals.csv: $(wc -l < data/upload/actuals.csv)"
        else
          echo "✗ Actuals data missing"
        fi
        
        if [ -f data/upload/predicted.csv ]; then
          echo "✓ Predictions data saved"
          echo "Rows in predicted.csv: $(wc -l < data/upload/predicted.csv)"
        else
          echo "✗ Predictions data missing"
        fi
        
        if [ -f data/upload/forecasted_data.csv ]; then
          echo "✓ Forecast data saved"
          echo "Rows in forecasted_data.csv: $(wc -l < data/upload/forecasted_data.csv)"
        else
          echo "✗ Forecast data missing"
        fi
        
        if [ -f data/upload/model_metrics.csv ]; then
          echo "✓ Model metrics saved"
          echo "Metrics content:"
          head -n 5 data/upload/model_metrics.csv
        else
          echo "✗ Model metrics missing"
        fi
    
    # UPDATED: Use device code authentication (works without app registration)
    - name: Authenticate with Microsoft 365
      if: success()
      env:
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
      run: |
        echo "Authenticating with Microsoft 365 using device code..."
        
        # Use device code authentication (doesn't require app registration)
        echo "Starting device code flow..."
        
        # Run authentication in background and capture output
        timeout 300 m365 login --authType deviceCode > auth_output.txt 2>&1 &
        AUTH_PID=$!
        
        # Wait a moment for the device code to be generated
        sleep 5
        
        # Display the authentication instructions
        if [ -f auth_output.txt ]; then
          echo "Authentication instructions:"
          cat auth_output.txt
        fi
        
        # For GitHub Actions, we need to handle this differently
        # Let's try a simpler approach with error handling
        
        echo "⚠️  DEVICE CODE AUTHENTICATION REQUIRED"
        echo "This step requires manual authentication via browser."
        echo "For automated workflows, we need to use certificate-based auth."
        echo "Skipping SharePoint upload for now..."
        
        # Mark this step as successful but skip actual auth
        echo "auth_skipped=true" >> $GITHUB_ENV
        
    # ALTERNATIVE: Skip SharePoint upload if authentication is manual
    - name: Upload CSV files to SharePoint
      if: success() && env.auth_skipped != 'true'
      env:
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
      run: |
        echo "This step would upload CSV files to SharePoint..."
        echo "Skipped due to authentication requirements."
        
    # NEW: Alternative upload using direct REST API
    - name: Alternative CSV upload using Python requests
      if: success()
      env:
        M365_USERNAME: ${{ secrets.M365_USERNAME }}
        M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
      run: |
        echo "Attempting direct SharePoint upload using Python..."
        
        cat << 'EOF' > direct_upload.py
        import requests
        import os
        import json
        from datetime import datetime
        import glob
        
        def upload_to_sharepoint():
            username = os.getenv('M365_USERNAME')
            password = os.getenv('M365_PASSWORD') 
            site_url = os.getenv('SHAREPOINT_SITE_URL')
            
            if not all([username, password, site_url]):
                print("❌ Missing credentials")
                return False
                
            print(f"📤 Attempting SharePoint upload...")
            print(f"Site: {site_url}")
            print(f"User: {username}")
            
            # This is a simplified approach - in practice you'd need proper authentication
            print("⚠️  Direct REST API upload requires more complex authentication")
            print("🔄 For now, CSV files are saved as artifacts")
            
            # List CSV files that would be uploaded
            csv_files = glob.glob('data/upload/*.csv')
            if csv_files:
                print(f"📊 Found {len(csv_files)} CSV files ready for upload:")
                for f in csv_files:
                    size = os.path.getsize(f)
                    print(f"  - {os.path.basename(f)} ({size} bytes)")
            else:
                print("❌ No CSV files found")
                
            return True
            
        if __name__ == "__main__":
            upload_to_sharepoint()
        EOF
        
        python direct_upload.py
        
    - name: SharePoint upload status
      if: success()
      run: |
        echo "==============================================="
        echo "📊 SHAREPOINT UPLOAD STATUS"
        echo "Method: Alternative approach needed"
        echo "Reason: M365 CLI requires interactive authentication"
        echo "Files: Available as GitHub Actions artifacts"
        echo "Next step: Set up certificate-based authentication"
        echo "==============================================="
        
    - name: Summary
      if: always()
      run: |
        echo "===== DAILY FORECAST WORKFLOW SUMMARY ====="
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Triggered by: ${{ github.event_name }}"
        echo "Status: ${{ job.status }}"
        echo "Timestamp: $(date -u)"
        echo ""
        echo "📊 Forecast: ✅ Generated"  
        echo "💾 Artifacts: ✅ Saved"
        echo "📤 SharePoint: ⏸️  Pending auth setup"
        echo "=============================================="
