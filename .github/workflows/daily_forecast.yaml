name: Daily LSTM Forecast

on:
  # Run daily at 9:30 AM EST (after market open)
  schedule:
    - cron: '30 14 * * 1-5'  # 9:30 AM EST on weekdays (UTC-5/UTC-4)
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if market is closed'
        required: false
        default: false
        type: boolean

# Set timezone for the workflow
env:
  TZ: America/New_York

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Add requests-ntlm for better SharePoint authentication
        pip install requests-ntlm
        
    - name: Verify project structure
      run: |
        echo "Project structure:"
        ls -la
        echo "Source directory:"
        ls -la src/
        echo "Models directory:"
        ls -la models/
        echo "Data directories:"
        ls -la data/
        
    - name: Set up environment variables
      run: |
        echo "Setting up environment variables for forecasting..."
        # Environment variables are set via GitHub secrets
        # FRED_API_KEY, EMAIL_*, NOTIFICATION_EMAIL are available as secrets
        
    - name: Run daily forecast
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        PROJECT_ROOT: ${{ github.workspace }}
        PYTHONPATH: ${{ github.workspace }}/src
        FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      run: |
        cd src
        python daily_forecast.py
        
    - name: Upload forecast results
      if: always()  # Upload even if forecast fails for debugging
      uses: actions/upload-artifact@v4
      with:
        name: forecast-results-${{ github.run_number }}
        path: |
          data/upload/*.csv
          logs/*.log
        retention-days: 30
        
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: forecast-failure-logs-${{ github.run_number }}
        path: logs/
        retention-days: 90
        
    - name: Check forecast outputs
      if: success()
      run: |
        echo "Checking forecast outputs..."
        if [ -f data/upload/actuals.csv ]; then
          echo "✓ Actuals data saved"
          echo "Rows in actuals.csv: $(wc -l < data/upload/actuals.csv)"
        else
          echo "✗ Actuals data missing"
        fi
        
        if [ -f data/upload/predicted.csv ]; then
          echo "✓ Predictions data saved"
          echo "Rows in predicted.csv: $(wc -l < data/upload/predicted.csv)"
        else
          echo "✗ Predictions data missing"
        fi
        
        if [ -f data/upload/forecasted_data.csv ]; then
          echo "✓ Forecast data saved"
          echo "Rows in forecasted_data.csv: $(wc -l < data/upload/forecasted_data.csv)"
        else
          echo "✗ Forecast data missing"
        fi
        
        if [ -f data/upload/model_metrics.csv ]; then
          echo "✓ Model metrics saved"
          echo "Metrics content:"
          head -n 5 data/upload/model_metrics.csv
        else
          echo "✗ Model metrics missing"
        fi
    
    - name: Create SharePoint uploader script
      if: success()
      run: |
        cat > sharepoint_uploader.py << 'SCRIPT_EOF'
        #!/usr/bin/env python3
        """
        SharePoint CSV Uploader - Daily Overwrite Version
        Files are overwritten each day with the same names
        """
        
        import os
        import requests
        import json
        import glob
        from datetime import datetime
        import base64
        
        class SharePointBasicUploader:
            """SharePoint uploader using basic authentication"""
            
            def __init__(self):
                self.username = os.getenv('M365_USERNAME')
                self.password = os.getenv('M365_PASSWORD')
                self.site_url = os.getenv('SHAREPOINT_SITE_URL')
                self.folder_path = os.getenv('SHAREPOINT_FOLDER_PATH', 'Shared Documents')
                
                # Clean up site URL
                if self.site_url and self.site_url.endswith('/'):
                    self.site_url = self.site_url[:-1]
                    
                self.session = requests.Session()
                self.form_digest = None
                
            def get_form_digest(self):
                """Get form digest token for SharePoint operations"""
                print("🔐 Getting SharePoint form digest...")
                
                digest_url = f"{self.site_url}/_api/contextinfo"
                
                try:
                    # Use NTLM authentication
                    from requests_ntlm import HttpNtlmAuth
                    auth = HttpNtlmAuth(self.username, self.password)
                    
                    response = self.session.post(
                        digest_url,
                        auth=auth,
                        headers={
                            'Accept': 'application/json;odata=verbose',
                            'Content-Type': 'application/json;odata=verbose'
                        }
                    )
                    
                    if response.status_code == 200:
                        data = response.json()
                        self.form_digest = data['d']['GetContextWebInformation']['FormDigestValue']
                        print("   ✅ Form digest obtained")
                        return True
                    else:
                        print(f"   ❌ Form digest failed: {response.status_code}")
                        return False
                        
                except ImportError:
                    print("   ⚠️  requests-ntlm not available, trying basic auth...")
                    return self._try_basic_auth_digest()
                except Exception as e:
                    print(f"   ❌ Form digest error: {e}")
                    return False
            
            def _try_basic_auth_digest(self):
                """Fallback to basic authentication"""
                digest_url = f"{self.site_url}/_api/contextinfo"
                
                try:
                    # Basic authentication
                    auth_string = f"{self.username}:{self.password}"
                    auth_bytes = auth_string.encode('utf-8')
                    auth_b64 = base64.b64encode(auth_bytes).decode('utf-8')
                    
                    response = self.session.post(
                        digest_url,
                        headers={
                            'Authorization': f'Basic {auth_b64}',
                            'Accept': 'application/json;odata=verbose',
                            'Content-Type': 'application/json;odata=verbose'
                        }
                    )
                    
                    if response.status_code == 200:
                        data = response.json()
                        self.form_digest = data['d']['GetContextWebInformation']['FormDigestValue']
                        print("   ✅ Basic auth form digest obtained")
                        return True
                    else:
                        print(f"   ❌ Basic auth digest failed: {response.status_code}")
                        print(f"   Response: {response.text[:200]}...")
                        return False
                        
                except Exception as e:
                    print(f"   ❌ Basic auth digest error: {e}")
                    return False
            
            def upload_file(self, file_path, filename=None):
                """Upload a single file to SharePoint (overwrite existing)"""
                if not self.form_digest:
                    if not self.get_form_digest():
                        return False
                
                if not filename:
                    filename = os.path.basename(file_path)
                
                print(f"📤 Uploading: {filename} (overwrite=true)")
                
                # Read file content
                try:
                    with open(file_path, 'rb') as f:
                        file_content = f.read()
                except Exception as e:
                    print(f"   ❌ Failed to read file: {e}")
                    return False
                
                # Upload URL with overwrite=true
                upload_url = f"{self.site_url}/_api/web/getfolderbyserverrelativeurl('{self.folder_path}')/files/add(url='{filename}',overwrite=true)"
                
                try:
                    headers = {
                        'Accept': 'application/json;odata=verbose',
                        'X-RequestDigest': self.form_digest,
                        'Content-Type': 'application/octet-stream'
                    }
                    
                    # Try NTLM first
                    try:
                        from requests_ntlm import HttpNtlmAuth
                        auth = HttpNtlmAuth(self.username, self.password)
                        
                        response = self.session.post(
                            upload_url,
                            auth=auth,
                            headers=headers,
                            data=file_content
                        )
                        
                    except ImportError:
                        # Fallback to basic auth
                        auth_string = f"{self.username}:{self.password}"
                        auth_bytes = auth_string.encode('utf-8')
                        auth_b64 = base64.b64encode(auth_bytes).decode('utf-8')
                        headers['Authorization'] = f'Basic {auth_b64}'
                        
                        response = self.session.post(
                            upload_url,
                            headers=headers,
                            data=file_content
                        )
                    
                    if response.status_code in [200, 201]:
                        print(f"   ✅ Upload successful - File overwritten")
                        
                        # Parse response for details
                        try:
                            data = response.json()
                            server_url = data.get('d', {}).get('ServerRelativeUrl', 'Unknown')
                            file_size = len(file_content)
                            print(f"   📍 URL: {server_url}")
                            print(f"   📏 Size: {file_size} bytes")
                        except:
                            print(f"   📏 Size: {len(file_content)} bytes")
                        
                        return True
                    else:
                        print(f"   ❌ Upload failed: {response.status_code}")
                        print(f"   Response: {response.text[:300]}...")
                        return False
                        
                except Exception as e:
                    print(f"   ❌ Upload error: {e}")
                    return False
            
            def upload_csv_files(self, directory="data/upload"):
                """Upload all CSV files from directory (daily overwrite)"""
                print(f"🔍 Looking for CSV files in {directory}...")
                
                csv_files = glob.glob(f"{directory}/*.csv")
                if not csv_files:
                    print(f"   ❌ No CSV files found in {directory}")
                    return False
                
                print(f"   📊 Found {len(csv_files)} CSV files")
                print("   📝 Files will overwrite existing versions in SharePoint")
                
                success_count = 0
                total_count = len(csv_files)
                
                for csv_file in csv_files:
                    print(f"\n{'='*60}")
                    if self.upload_file(csv_file):
                        success_count += 1
                    else:
                        print(f"   ❌ Failed to upload {os.path.basename(csv_file)}")
                
                print(f"\n{'='*60}")
                print(f"📊 DAILY UPLOAD SUMMARY")
                print(f"Total files: {total_count}")
                print(f"Successful: {success_count}")
                print(f"Failed: {total_count - success_count}")
                
                if success_count == total_count:
                    print("🎉 All files uploaded successfully!")
                elif success_count > 0:
                    print("⚠️  Some files uploaded, check logs above")
                else:
                    print("❌ No files uploaded successfully")
                    
                print(f"{'='*60}")
                
                return success_count > 0
        
        def main():
            """Main upload function"""
            print("🚀 DAILY SHAREPOINT CSV UPLOADER")
            print("=" * 50)
            print(f"⏰ Upload time: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            print("📝 Mode: Daily overwrite (no timestamps)")
            print()
            
            # Validate environment variables
            required_vars = ['M365_USERNAME', 'M365_PASSWORD', 'SHAREPOINT_SITE_URL']
            missing_vars = [var for var in required_vars if not os.getenv(var)]
            
            if missing_vars:
                print("❌ Missing required environment variables:")
                for var in missing_vars:
                    print(f"   - {var}")
                return False
            
            # Initialize uploader
            uploader = SharePointBasicUploader()
            
            print(f"🌐 Site: {uploader.site_url}")
            print(f"👤 User: {uploader.username}")
            print(f"📁 Folder: {uploader.folder_path}")
            print()
            
            # Upload CSV files
            if uploader.upload_csv_files():
                print("\n🎉 DAILY UPLOAD SUCCESSFUL!")
                print("📊 Fresh forecast data is now available in SharePoint")
                return True
            else:
                print("\n❌ DAILY UPLOAD FAILED")
                return False
        
        if __name__ == "__main__":
            success = main()
            exit(0 if success else 1)
        SCRIPT_EOF
        
        chmod +x sharepoint_uploader.py
        echo "✅ SharePoint uploader script created"
    
    - name: Upload CSV files to SharePoint
      if: success()
      env:
        M365_USERNAME: ${{ secrets.M365_USERNAME }}
        M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_FOLDER_PATH: ${{ secrets.SHAREPOINT_FOLDER_PATH }}
      run: |
        echo "🚀 Starting daily SharePoint upload (overwrite mode)..."
        python sharepoint_uploader.py
        
    - name: SharePoint upload summary
      if: success()
      run: |
        echo "==============================================="
        echo "✅ DAILY WORKFLOW COMPLETED SUCCESSFULLY"
        echo "📊 Forecast: Generated fresh daily data"
        echo "💾 Artifacts: Saved to GitHub Actions"
        echo "📤 SharePoint: CSV files overwritten with today's data"
        echo "🔄 Next run: Tomorrow at 9:30 AM EST"
        echo "🕒 Completed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "==============================================="
        
    - name: Summary
      if: always()
      run: |
        echo "===== DAILY FORECAST WORKFLOW SUMMARY ====="
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Triggered by: ${{ github.event_name }}"
        echo "Status: ${{ job.status }}"
        echo "Timestamp: $(date -u)"
        echo "=============================================="
